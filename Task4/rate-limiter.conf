http {
    # Зона для веб-приложения: 50 запросов в секунду
    limit_req_zone $binary_remote_addr zone=web:10m rate=50r/s;

    # Зона для мобильного приложения: 30 запросов в секунду
    limit_req_zone $binary_remote_addr zone=mobile:10m rate=30r/s;

    server {
        listen 80;

        # Эндпоинт для веб-приложения
        location /api/web/ {
            limit_req zone=web burst=100;
            proxy_pass http://backend;
        }

        # Эндпоинт для мобильного приложения
        location /api/mobile/ {
            limit_req zone=mobile burst=60;
            proxy_pass http://backend;
        }
    }
}
