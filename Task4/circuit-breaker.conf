http {
    upstream logistics_backend {
        # Circuit Breaker: 5 ошибок подряд -> блокировка на 30 секунд
        server logistics.company.com max_fails=5 fail_timeout=30s;
    }

    server {
        listen 8080;

        location /logistics/ {
            proxy_pass http://logistics_backend;

            # Таймауты ответа — 3 секунды
            proxy_connect_timeout 3s;
            proxy_read_timeout 3s;

            # Определяем, какие ошибки считать неудачными попытками
            proxy_next_upstream error timeout http_502 http_503 http_504;

            # При ошибках отдаём fallback-ответ
            error_page 502 503 504 = @fallback;
        }

        # Fallback-ответ когда Circuit Breaker открыт
        location @fallback {
            default_type application/json;
            return 503 '{"error": "Service temporarily unavailable", "message": "Circuit breaker is open. Service will retry after timeout."}';
        }
    }
}
